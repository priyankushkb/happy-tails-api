services:
  - type: web
    name: happy-tails-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install && npm run build && npm run prisma:generate
    startCommand: npm run prisma:deploy && npm run start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false